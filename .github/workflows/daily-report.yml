name: Daily meta report

on:
  schedule:
    # Daily 13:23 UTC = 9:23 AM ET (EDT). Off-minute to dodge the :00 rush.
    - cron: "23 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        run: |
          FLAGS=""
          # Mondays: also archive the dated weekly snapshot
          if [ "$(date -u +%u)" = "1" ]; then FLAGS="--snapshot"; fi
          uv run python scripts/daily_report.py $FLAGS

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily meta update $(date -u +%F)"
            git push
          fi
